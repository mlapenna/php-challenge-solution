services:
  app:
    build: .
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: visitor_analytics
      DB_USERNAME: analytics_user
      DB_PASSWORD: analytics_password
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "composer install && composer start"

  mysql:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: visitor_analytics
      MYSQL_USER: analytics_user
      MYSQL_PASSWORD: analytics_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uanalytics_user", "-panalytics_password"]
      interval: 5s
      timeout: 5s
      retries: 20

